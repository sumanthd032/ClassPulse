version: "3.9"

# Development override — hot reload for API and frontend dev server
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DEBUG=true

  worker:
    command: celery -A app.workers.celery_app worker --loglevel=debug --concurrency=2

  # In dev, run frontend outside Docker with `npm run dev` (Vite HMR)
  # Nginx is skipped; frontend dev server proxies /api to localhost:8000
