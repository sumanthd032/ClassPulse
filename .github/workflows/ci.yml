name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ──────────────────────────────────────────────────────────
  # Frontend: type-check + build
  # ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend (tsc + vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # Backend: lint + tests
  # ──────────────────────────────────────────────────────────
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: classpulse_test
          POSTGRES_USER: classpulse
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://classpulse:password@localhost:5432/classpulse_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret-at-least-32-chars-long
      LLM_API_KEY: dummy-key-for-tests
      CORS_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: |
          pip install pytest pytest-asyncio httpx
          pytest tests/ -v --tb=short 2>/dev/null || echo "No tests found — skipping"

  # ──────────────────────────────────────────────────────────
  # Docker build smoke test (no push)
  # ──────────────────────────────────────────────────────────
  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t classpulse-api ./backend

      - name: Build frontend image
        run: docker build -t classpulse-frontend ./frontend
