version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: classpulse_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-classpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-classpulse_secret}
      POSTGRES_DB: ${POSTGRES_DB:-classpulse}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-classpulse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - classpulse_net

  redis:
    image: redis:7-alpine
    container_name: classpulse_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - classpulse_net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: classpulse_api
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - classpulse_net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: classpulse_worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - classpulse_net
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: classpulse_beat
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - classpulse_net
    command: celery -A app.workers.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: classpulse_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/app/uploads:ro
    depends_on:
      - api
    networks:
      - classpulse_net

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  classpulse_net:
    driver: bridge
